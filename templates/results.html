<!DOCTYPE html>
<html>
<head>
    <title>Assessment Results</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>📊 Your Assessment Report</h1>

    <!-- Overall Score -->
    <div class="card">
        <h2>Overall Score</h2>
        <h1 id="overallScore">--</h1>
    </div>

    <!-- Skill Breakdown -->
    <div class="card">
        <h2>Skill Breakdown</h2>
        <div id="skillsContainer"></div>
    </div>

    <!-- Gap Analysis -->
    <div class="card">
        <h2>Gap Analysis</h2>
        <ul id="gapsList"></ul>
    </div>

    <!-- Learning Plan -->
    <div class="card">
        <h2>📚 Personalized Learning Plan</h2>
        <div id="learningPlan"></div>
    </div>
</div>

<script>
async function loadResults() {
    const res = await fetch("/api/report", {
        method: "POST"
    });

    const data = await res.json();
    const report = data.report;

    // Overall Score
    document.getElementById("overallScore").innerText =
        report.gap_analysis.overall_score + "%";

    // Skills
    const skillsDiv = document.getElementById("skillsContainer");
    report.skill_scores.forEach(skill => {
        const el = document.createElement("div");
        el.className = "skill";
        el.innerHTML = `
            <strong>${skill.skill_name}</strong>
            <div>Score: ${skill.score}</div>
        `;
        skillsDiv.appendChild(el);
    });

    // Gaps
    const gapsList = document.getElementById("gapsList");
    report.gap_analysis.critical_gaps.forEach(g => {
        const li = document.createElement("li");
        li.innerText = g.skill + " - " + g.gap;
        gapsList.appendChild(li);
    });

    // Learning Plan
    const planDiv = document.getElementById("learningPlan");
    planDiv.innerHTML = "<pre>" + JSON.stringify(report.learning_plan, null, 2) + "</pre>";
}

// 👉 THIS MUST BE OUTSIDE THE FUNCTION
loadResults();
</script>

</body>
</html>
